name: check-pr

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - run: |
          chmod +x scripts/build.sh
          chmod +x scripts/deploy.sh
          scripts/build.sh
      - name: Install dependencies
        run: |
          npx playwright install-deps
          npx playwright install
      - name: Run tests
        run: yarn run test
